<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broadcast Pro - Mauro Polini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body class="bg-zinc-950 text-white m-0 p-0 overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const THEMES = {
            modernBlue: { name: 'Azul Moderno', panelBg: 'bg-blue-900/95', text: 'text-white', border: 'border-blue-400/50', accent: 'bg-blue-600', shadow: 'shadow-xl' },
            breakingRed: { name: 'Último Momento', panelBg: 'bg-red-950/95', text: 'text-white', border: 'border-red-500', accent: 'bg-red-600', shadow: 'shadow-2xl' }
        };

        function App() {
            const isOverlay = window.location.search.includes('mode=overlay');
            const [state, setState] = useState({
                theme: 'modernBlue',
                liveBadge: { show: true },
                lowerThird: { title: 'TÍTULO PRINCIPAL', subtitle: 'SUBTÍTULO DE LA NOTICIA', show: false }
            });

            const bc = useRef(new BroadcastChannel('obs_channel_v1'));

            useEffect(() => {
                bc.current.onmessage = (e) => { if (isOverlay) setState(e.data); };
            }, [isOverlay]);

            const update = (newState) => {
                setState(newState);
                bc.current.postMessage(newState);
            };

            if (isOverlay) return <OverlayView state={state} />;

            return (
                <div className="h-screen w-screen flex bg-zinc-950 text-white">
                    <aside className="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col p-6 gap-6">
                        <h1 className="font-black text-xl uppercase italic text-blue-500">PRO PANEL</h1>
                        <div className="flex-1 space-y-4">
                            <button 
                                onClick={() => update({...state, lowerThird: {...state.lowerThird, show: !state.lowerThird.show}})}
                                className={`w-full p-4 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${state.lowerThird.show ? 'bg-red-600' : 'bg-zinc-800'}`}
                            >
                                {state.lowerThird.show ? 'OCULTAR AL AIRE' : 'MOSTRAR AL AIRE'}
                            </button>
                            <div className="p-4 bg-zinc-800/50 rounded-2xl border border-zinc-800">
                                <p className="text-[9px] font-black text-zinc-500 uppercase mb-2">Desarrollador</p>
                                <p className="text-sm font-bold uppercase">Mauro Polini</p>
                                <p className="text-blue-400 text-xs font-mono">+54 3735 500082</p>
                            </div>
                        </div>
                        <button onClick={() => {
                            const url = new URL(window.location.href);
                            url.searchParams.set('mode', 'overlay');
                            navigator.clipboard.writeText(url.toString());
                            alert("Link copiado para OBS");
                        }} className="bg-blue-600 p-3 rounded-xl font-black text-[10px] uppercase">Copiar Link OBS</button>
                    </aside>
                    <main className="flex-1 p-10 space-y-8">
                        <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 space-y-6 shadow-2xl">
                            <input 
                                type="text" 
                                value={state.lowerThird.title} 
                                onChange={e => update({...state, lowerThird: {...state.lowerThird, title: e.target.value.toUpperCase()}})}
                                className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl text-white font-black text-2xl outline-none focus:border-blue-500"
                                placeholder="TÍTULO"
                            />
                            <textarea 
                                value={state.lowerThird.subtitle} 
                                onChange={e => update({...state, lowerThird: {...state.lowerThird, subtitle: e.target.value}})}
                                className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl text-white font-bold h-32 outline-none focus:border-blue-500"
                                placeholder="SUBTÍTULO"
                            />
                        </div>
                    </main>
                </div>
            );
        }

        function OverlayView({ state }) {
            const theme = THEMES[state.theme] || THEMES.modernBlue;
            return (
                <div className="absolute inset-0 w-[1920px] h-[1080px] pointer-events-none select-none bg-transparent overflow-hidden">
                    <div className={`absolute top-10 left-10 transition-all duration-700 ${state.liveBadge.show ? 'opacity-100 scale-100' : 'opacity-0'}`}>
                        <div className="bg-red-600 px-8 py-3 rounded-2xl flex items-center gap-4 border border-white/20 shadow-2xl">
                            <div className="w-4 h-4 bg-white rounded-full animate-pulse shadow-[0_0_10px_#fff]"></div>
                            <span className="text-xl font-black text-white uppercase tracking-widest">VIVO</span>
                        </div>
                    </div>
                    <div className={`absolute bottom-0 w-full transition-all duration-700 ${state.lowerThird.show ? 'translate-y-0 opacity-100' : 'translate-y-40 opacity-0'}`}>
                        <div className="w-full max-w-[1800px] mx-auto mb-12 flex flex-col px-16">
                            <div className={`px-12 py-4 rounded-t-[40px] w-fit ml-6 border-2 border-b-0 ${theme.panelBg} ${theme.border}`}>
                                <p className="text-3xl font-black text-white uppercase italic">{state.lowerThird.subtitle}</p>
                            </div>
                            <div className={`p-12 w-full border-2 rounded-[40px] rounded-tl-none ${theme.accent} ${theme.shadow} border-white/20`}>
                                <h2 className="text-8xl text-white font-black uppercase leading-none tracking-tighter">{state.lowerThird.title}</h2>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
