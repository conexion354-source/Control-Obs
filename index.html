<html lang="es">
<head>
    <meta charset="UTF-8" />

<body class="text-white m-0 p-0 overflow-hidden font-sans selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const isOverlayMode = new URLSearchParams(window.location.search).get('mode') === 'overlay';
        if (isOverlayMode) {
          document.documentElement.style.background = 'transparent';
          document.body.style.background = 'transparent';
        }

        // Importamos los componentes de React y Lucide del objeto window
        const { useState, useEffect, useRef } = React;
        const { 
          Settings = () => null, User = () => null, LayoutTemplate = () => null, CloudSun = () => null, MonitorPlay = () => null, 
          Search, Copy = () => null, Check = () => null, Link = () => null, RefreshCw = () => null, EyeOff = () => null, Eye = () => null, 
          Sparkles = () => null, Loader2 = () => null, Upload = () => null, Trash2 = () => null, Video = () => null, Radio = () => null, 
          Info = () => null, MessageCircle = () => null, Clock = () => null 
        } = window.LucideReact || {};
        const SearchIcon = Search || (({ size = 16 }) => (
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width={size}
            height={size}
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        ));

        // --- TU LÓGICA DE IA Y CONFIGURACIÓN ---
        const apiKey = ""; 

        async function fetchWithRetry(url, options, retries = 5) {
          const delays = [1000, 2000, 4000, 8000, 16000];
          for (let i = 0; i < retries; i++) {
            try {
              const response = await fetch(url, options);
              if (!response.ok) throw new Error(`Error HTTP! estado: ${response.status}`);
              return await response.json();
            } catch (error) {
              if (i === retries - 1) throw error;
              await new Promise(res => setTimeout(res, delays[i]));
            }
          }
        }

        async function generarZocaloIA(tema) {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const payload = {
            contents: [{ 
              parts: [{ 
                text: `Actúa como un productor experto de noticieros de televisión de Argentina. El presentador avisó que hablarán de: "${tema}". Genera un título muy impactante, corto y llamativo (máximo 5 palabras, siempre en MAYÚSCULAS). Genera también un subtítulo informativo y profesional (entre 10 y 20 palabras).` 
              }] 
            }],
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: { title: { type: "STRING" }, subtitle: { type: "STRING" } }
              }
            }
          };

          const data = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) return JSON.parse(text);
          throw new Error("No se obtuvo respuesta de la IA");
        }

        const resizeImage = (file, maxWidth = 150, maxHeight = 150) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > height) { if (width > maxWidth) { height = height * (maxWidth / width); width = maxWidth; } } 
                else { if (height > maxHeight) { width = width * (maxHeight / height); height = maxHeight; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
          });
        };

        const THEMES = {
          modernBlue: { name: 'Azul Moderno', panelBg: 'bg-blue-900/95', text: 'text-white', border: 'border-blue-400/50', accent: 'bg-blue-600', shadow: 'shadow-[0_0_15px_rgba(37,99,235,0.5)]', titleFont: 'font-["Montserrat"] font-black tracking-tight', bodyFont: 'font-["Inter"]' },
          elegantGold: { name: 'Elegante Pro', panelBg: 'bg-zinc-950/95', text: 'text-amber-50', border: 'border-amber-500/60', accent: 'bg-amber-600 text-black', shadow: 'shadow-[0_4px_25px_rgba(245,158,11,0.3)]', titleFont: 'font-["Montserrat"] font-black tracking-wide', bodyFont: 'font-["Inter"]' },
          glassmorphism: { name: 'Cristal Premium', panelBg: 'bg-white/10 backdrop-blur-2xl', text: 'text-white', border: 'border-white/20', accent: 'bg-white/20', shadow: 'shadow-[0_8px_32px_rgba(0,0,0,0.3)]', titleFont: 'font-["Poppins"] font-black tracking-widest uppercase', bodyFont: 'font-["Poppins"] font-medium' },
          sportsAction: { name: 'Deportes Bold', panelBg: 'bg-black/95', text: 'text-white', border: 'border-yellow-400', accent: 'bg-yellow-400 text-black', shadow: 'shadow-[0_4px_20px_rgba(250,204,21,0.4)]', titleFont: 'font-["Oswald"] font-black uppercase', bodyFont: 'font-["Inter"] font-bold' },
          breakingRed: { name: 'Último Momento', panelBg: 'bg-red-950/95', text: 'text-white', border: 'border-red-500', accent: 'bg-red-600', shadow: 'shadow-[0_0_30px_rgba(220,38,38,0.6)]', titleFont: 'font-["Montserrat"] font-black uppercase', bodyFont: 'font-["Inter"] font-bold' },
          morningShow: { name: 'Magazine Pro', panelBg: 'bg-white/95', text: 'text-slate-800', border: 'border-orange-400', accent: 'bg-orange-500 text-white', shadow: 'shadow-xl', titleFont: 'font-["Montserrat"] font-black', bodyFont: 'font-["Inter"] font-bold' },
          cyberpunk: { name: 'Industrial Cyber', panelBg: 'bg-zinc-950/95', text: 'text-green-400', border: 'border-green-500', accent: 'bg-green-600 text-black', shadow: 'shadow-[0_0_25px_rgba(34,197,94,0.4)]', titleFont: 'font-["Orbitron"] font-black tracking-widest', bodyFont: 'font-mono font-bold' },

        };

        const ANIMATIONS = {
          slideUp: { name: 'Deslizar Arriba' },
          slideSide: { name: 'Deslizar Lateral' },
          fade: { name: 'Desvanecer' },
          zoom: { name: 'Zoom Dinámico' }

        const WEATHER_PANEL_SIZES = {

          md: { name: 'Mediano', shell: 'gap-6 px-8 py-4 rounded-2xl', innerGap: 'gap-6', time: 'text-4xl', temp: 'text-3xl', city: 'text-[11px] tracking-[0.16em]', dividerPadding: 'pr-8' },
          lg: { name: 'Grande', shell: 'gap-8 px-10 py-5 rounded-2xl', innerGap: 'gap-8', time: 'text-5xl', temp: 'text-4xl', city: 'text-[12px] tracking-[0.2em]', dividerPadding: 'pr-10' }
        };

        const DEFAULT_STATE = {

          animation: 'slideUp',
          liveBadge: { show: true },
          lowerThird: { title: 'TÍTULO PRINCIPAL', subtitle: 'BAJADA INFORMATIVA DE LA NOTICIA...', show: false },

            { id: 'centro', name: 'Conductor 2', xOffset: 0, show: true, image: null },
            { id: 'derecha', name: 'Conductor 3', xOffset: 0, show: true, image: null }
          ],
          weather: { city: 'Buenos Aires', lat: -34.6131, lon: -58.3772, temp: 22, show: true, size: 'md' },
          time: { show: true }

        // --- COMPONENTES AUXILIARES ---
        const LiveToggle = ({ active, onClick, label }) => (
          <button onClick={onClick} className={`group relative flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-black text-[10px] transition-all duration-300 border overflow-hidden ${active ? 'bg-red-600 text-white border-red-400 shadow-[0_0_15px_rgba(220,38,38,0.5)] scale-[1.02]' : 'bg-zinc-900 text-zinc-500 border-zinc-800 hover:border-zinc-700'}`}>
            {active && <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full animate-[shimmer_2s_infinite]"></div>}
            <div className={`w-2 h-2 rounded-full ${active ? 'bg-white animate-pulse shadow-[0_0_8px_#fff]' : 'bg-zinc-700'}`}></div>
            <span className="tracking-tighter uppercase">{active ? `EN AIRE (${label})` : `MOSTRAR ${label}`}</span>
          </button>
        );

        function NavButton({ id, icon, label, active, onClick }) {
          const isAct = active === id;
          return (
            <button onClick={() => onClick(id)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${isAct ? 'bg-white/5 text-white border border-white/10 font-bold' : 'text-zinc-500 hover:text-zinc-300'}`}>
              {icon} <span className="text-[11px] uppercase tracking-widest">{label}</span>
            </button>
          );
        }

        // --- PANELES ---
        function PanelZocalos({ state, updateState }) {
          const { title, subtitle, show } = state.lowerThird;
          const [dt, setDt] = useState(title);
          const [ds, setDs] = useState(subtitle);
          const [topic, setTopic] = useState('');
          const [gen, setGen] = useState(false);

          useEffect(() => { setDt(title); setDs(subtitle); }, [title, subtitle]);

          const handleAI = async () => {
            if (!topic.trim()) return; setGen(true);
            try { const r = await generarZocaloIA(topic); setDt(r.title); setDs(r.subtitle); } catch (e) {} finally { setGen(false); }
          };

          return (
            <div className="space-y-4">
              <div className="flex justify-between items-center bg-zinc-900 p-5 rounded-2xl border border-zinc-800 shadow-xl">
                <h2 className="text-lg font-black uppercase italic tracking-tighter">Generador de Noticias</h2>
                <LiveToggle active={show} onClick={() => updateState({ lowerThird: { ...state.lowerThird, show: !show, title: dt, subtitle: ds } })} label="Zócalo" />
              </div>
              <div className="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 flex gap-2">
                <input type="text" value={topic} onChange={(e) => setTopic(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAI()} className="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs focus:border-blue-500 outline-none text-white" placeholder="IA: Escribe un tema para que la IA redacte..." />
                <button onClick={handleAI} disabled={gen} className="px-6 bg-blue-600 rounded-xl font-black text-[10px] tracking-widest hover:bg-blue-500 transition-all">{gen ? '...' : 'GENERAR'}</button>
              </div>
              <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-4 flex-1">
                <div>
                  <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 block">Título Principal (ABAJO)</label>
                  <input type="text" value={dt} onChange={(e) => setDt(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white font-black text-lg focus:border-blue-500 outline-none uppercase" placeholder="TÍTULO GRANDE" />
                </div>
                <div>
                  <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2 block">Subtítulo / Bajada (ARRIBA)</label>
                  <textarea value={ds} onChange={(e) => setDs(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white text-sm font-bold focus:border-blue-500 outline-none h-24 resize-none" placeholder="Texto informativo..." />
                </div>
                <button onClick={() => updateState({ lowerThird: { ...state.lowerThird, title: dt, subtitle: ds } })} className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-[10px] font-black tracking-widest transition-all">SINCRONIZAR TEXTOS</button>
              </div>
            </div>
          );
        }

        function PanelConductores({ state, updateState }) {
          const updH = (i, f, v) => {
            const nh = [...state.hosts]; nh[i] = { ...nh[i], [f]: v };
            updateState({ hosts: nh });
          };
          const handleImg = async (i, e) => {
            const f = e.target.files[0]; if (f) { const b64 = await resizeImage(f); updH(i, 'image', b64); }
          };
          return (
            <div className="space-y-4">
              <div className="flex justify-between items-center bg-zinc-900 p-5 rounded-2xl border border-zinc-800 shadow-xl">
                <h2 className="text-lg font-black uppercase italic tracking-tighter">Conductores</h2>
                <div className="flex gap-2">
                  <button onClick={() => updateState({ hosts: state.hosts.map(h => ({ ...h, show: false })) })} className="px-4 py-2 bg-zinc-800 text-zinc-500 rounded-lg text-[10px] font-black hover:text-red-500 transition-all">RESET</button>
                  <button onClick={() => updateState({ hosts: state.hosts.map(h => ({ ...h, show: true })) })} className="px-4 py-2 bg-zinc-800 text-zinc-500 rounded-lg text-[10px] font-black hover:text-blue-500 transition-all">ALL LIVE</button>
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {state.hosts.map((h, i) => (
                  <div key={h.id} className={`p-5 rounded-2xl border transition-all ${h.show ? 'bg-blue-600/5 border-blue-500/40 shadow-xl' : 'bg-zinc-900 border-zinc-800 opacity-60'}`}>
                    <div className="flex justify-between items-center mb-4">
                      <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">{h.id}</span>
                      <LiveToggle active={h.show} onClick={() => updH(i, 'show', !h.show)} label="Aire" />
                    </div>
                    <div className="space-y-3">
                      <input type="text" value={h.name} onChange={(e) => updH(i, 'name', e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-2.5 text-xs font-bold outline-none text-white" placeholder="Nombre..." />
                      <div className="flex justify-between text-[9px] font-black text-zinc-500 uppercase"><span>Posición</span> <span>{h.xOffset}px</span></div>
                      <input type="range" min="-400" max="400" value={h.xOffset} onChange={(e) => updH(i, 'xOffset', parseInt(e.target.value))} className="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer" />
                      <label className="flex items-center gap-3 p-3 bg-zinc-950 rounded-xl border border-zinc-800 cursor-pointer hover:border-zinc-600">
                        {h.image ? <img src={h.image} className="w-8 h-8 rounded-full object-cover border border-zinc-700" /> : <div className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center border border-zinc-700"><User size={12}/></div>}
                        <span className="text-[10px] font-black uppercase text-zinc-500">Foto</span>
                        <input type="file" className="hidden" accept="image/*" onChange={(e) => handleImg(i, e)} />
                      </label>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function PanelClima({ state, updateState }) {
          const [q, setQ] = useState('');
          const [res, setRes] = useState([]);
          const weatherSize = state.weather.size || 'md';
          const sCity = async () => {
            if (!q) return;
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`);
            setRes(await r.json());
          };
          return (
            <div className="space-y-4">
              <div className="grid md:grid-cols-2 gap-4">
                <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                  <div className="flex justify-between items-center mb-5">
                    <h3 className="text-xs font-black uppercase tracking-widest text-zinc-500">Módulo Clima</h3>
                    <LiveToggle active={state.weather.show} onClick={() => updateState({ weather: { ...state.weather, show: !state.weather.show } })} label="Clima" />
                  </div>
                  <div className="flex gap-2 relative mb-4">
                    <input type="text" value={q} onChange={(e) => setQ(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && sCity()} className="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs focus:border-blue-500 outline-none text-white" placeholder="Buscar ciudad..." />
                    <button onClick={sCity} className="p-3 bg-zinc-800 rounded-xl hover:bg-zinc-700 text-white"><SearchIcon size={16}/></button>
                  </div>
                  {res.length > 0 && <div className="mb-4 bg-zinc-950 rounded-xl border border-zinc-800 overflow-hidden">{res.map(r => <button key={r.place_id} onClick={async () => {
                    const wr = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&current_weather=true`);
                    const wd = await wr.json();
                    updateState({ weather: { ...state.weather, city: r.display_name.split(',')[0], lat: r.lat, lon: r.lon, temp: Math.round(wd.current_weather.temperature) } });
                    setRes([]); setQ('');
                  }} className="w-full p-2 text-left text-[10px] hover:bg-zinc-800 border-b border-zinc-800 last:border-0">{r.display_name}</button>)}</div>}
                  <div className="bg-zinc-950 p-5 rounded-2xl border border-zinc-800 flex justify-between items-center">
                    <span className="font-black text-xl italic uppercase tracking-tighter">{state.weather.city}</span>
                    <span className="font-black text-3xl text-blue-500 tracking-tighter">{state.weather.temp}°C</span>
                  </div>
                </div>
                <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 flex flex-col justify-between">
                  <div>
                    <div className="flex justify-between items-center">
                      <h3 className="text-xs font-black uppercase tracking-widest text-zinc-500">Módulo Hora</h3>
                      <LiveToggle active={state.time.show} onClick={() => updateState({ time: { ...state.time, show: !state.time.show } })} label="Reloj" />
                    </div>
                    <div className="mt-5 bg-zinc-950 p-4 rounded-2xl border border-zinc-800">
                      <div className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-3">Tamaño Clima / Hora</div>
                      <div className="grid grid-cols-3 gap-2">
                        {Object.entries(WEATHER_PANEL_SIZES).map(([sizeKey, sizeConfig]) => (
                          <button
                            key={sizeKey}
                            onClick={() => updateState({ weather: { ...state.weather, size: sizeKey } })}
                            className={`p-2 rounded-xl border text-[10px] font-black uppercase tracking-wider transition-all ${
                              weatherSize === sizeKey
                                ? 'bg-blue-600 border-blue-400 text-white shadow-[0_0_14px_rgba(37,99,235,0.45)]'
                                : 'bg-zinc-900 border-zinc-800 text-zinc-500 hover:text-zinc-200 hover:border-zinc-700'

                            {sizeConfig.name}

                      </div>
                    </div>
                  </div>
                  <div className="text-center py-6 font-black text-5xl text-zinc-800 tracking-tighter uppercase italic opacity-20">Reloj Studio</div>
                </div>
              </div>
            </div>
          );
        }

        function PanelTema({ state, updateState }) {
          return (
            <div className="space-y-4">
              <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 shadow-lg">
                <h3 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">Efectos de Transición</h3>

                  {Object.entries(ANIMATIONS).map(([k, v]) => (
                    <button key={k} onClick={() => updateState({ animation: k })} className={`p-4 rounded-xl border text-center transition-all ${state.animation === k ? 'bg-blue-600 border-blue-400 font-black text-xs' : 'bg-zinc-950 border-zinc-800 text-zinc-500 text-xs'}`}>{v.name.toUpperCase()}</button>

        function PanelInfo() {
          return (
            <div className="space-y-4">
              <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl flex flex-col items-center text-center">

                  <Radio size={32} className="text-blue-500" />
                </div>
                <h2 className="text-2xl font-black uppercase tracking-tighter italic mb-1">Información Técnica</h2>
                <p className="text-zinc-500 text-sm max-w-sm mb-8">Generador de caracteres profesional para transmisiones de alta gama en OBS Studio.</p>
                <div className="w-full h-px bg-zinc-800 mb-8"></div>
                <div className="space-y-6 w-full max-w-xs text-left">
                  <div>
                    <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1 block">Creado por</span>
                    <span className="text-lg font-bold text-white uppercase">Mauro Maximiliano Polini</span>
                  </div>
                  <div>
                    <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1 block">Soporte WhatsApp</span>
                    <a href="https://wa.me/543735500082" target="_blank" className="flex items-center gap-2 text-blue-400 hover:text-blue-300 font-bold transition-colors text-lg"><MessageCircle size={20} /> +54 3735 500082</a>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function PreviewScreen({ state }) {
          const ref = useRef(null); const [s, setS] = useState(1);
          useEffect(() => {
            const node = ref.current;
            if (!node) return undefined;

            // Fallback para entornos donde ResizeObserver no está disponible.
            if (typeof ResizeObserver === 'undefined') {
              const updateScale = () => {
                const width = node.getBoundingClientRect().width || 1920;
                setS(width / 1920);
              };
              updateScale();
              window.addEventListener('resize', updateScale);
              return () => window.removeEventListener('resize', updateScale);
            }

            const ob = new ResizeObserver((entries) => {
              for (const entry of entries) {
                setS(entry.contentRect.width / 1920);
              }
            });
            ob.observe(node);
            return () => ob.disconnect();
          }, []);
          return (
            <div ref={ref} className="w-full aspect-video relative rounded-xl bg-black border border-zinc-700 overflow-hidden shadow-2xl">
              <div className="absolute top-0 left-0 w-[1920px] h-[1080px] pointer-events-none origin-top-left" style={{ transform: `scale(${s})` }}>
                <OverlayView state={state} isPreview={true} />
              </div>
            </div>
          );
        }

        // --- VISTA OVERLAY PARA OBS ---
        function OverlayView({ state, isPreview = false }) {
          const [t, setT] = useState('');
          const activeTheme = THEMES[state.theme] || THEMES.modernBlue;
          const weatherPanelSize = WEATHER_PANEL_SIZES[state.weather.size] || WEATHER_PANEL_SIZES.md;
          const anim = state.animation || 'slideUp';

          useEffect(() => {
            const iv = setInterval(() => setT(new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })), 1000);
            return () => clearInterval(iv);
          }, []);

          const getFX = (show, type) => {
            if (show) return 'opacity-100 translate-y-0 translate-x-0 scale-100';
            if (anim === 'slideUp') return type === 'host' ? 'opacity-0 translate-y-20 scale-90' : 'opacity-0 translate-y-full';
            if (anim === 'slideSide') return type === 'host' ? 'opacity-0 translate-x-20' : 'opacity-0 -translate-x-full';
            if (anim === 'fade') return 'opacity-0 scale-98';
            if (anim === 'zoom') return 'opacity-0 scale-90 translate-y-10';
            return 'opacity-0';
          };

          return (
            <div className={`absolute inset-0 w-full h-full overflow-hidden pointer-events-none select-none font-sans ${isPreview ? '' : 'bg-transparent'}`}>
              <style dangerouslySetInnerHTML={{__html: `@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&family=Orbitron:wght@700&family=Roboto:wght@900&display=swap');`}} />

              {/* Cartel VIVO */}
              <div className={`absolute top-10 left-10 transition-all duration-700 ease-out z-50 ${ (state.liveBadge.show) ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-10 scale-95' }`}>
                <div className="bg-red-600 px-6 py-2 flex items-center justify-center gap-3 rounded-xl border border-white/20 shadow-2xl">
                  <div className="w-3 h-3 rounded-full bg-white animate-pulse"></div>
                  <span className="text-xs font-black tracking-[0.4em] text-white">VIVO</span>
                </div>
              </div>

              {/* Clima / Hora */}
              <div className={`absolute top-10 right-10 flex flex-col items-end gap-3 transition-all duration-700 ease-out z-50 ${ (state.time.show || state.weather.show) ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-10 scale-95' }`}>
                <div className={`flex items-center backdrop-blur-3xl border ${weatherPanelSize.shell} ${weatherPanelSize.innerGap} ${activeTheme.panelBg} ${activeTheme.text} ${activeTheme.border} ${activeTheme.shadow}`}>
                  {state.time.show && <div className={`${weatherPanelSize.time} font-black tracking-tighter ${state.weather.show ? `border-r border-current/20 ${weatherPanelSize.dividerPadding}` : ''}`}>{t || '00:00'}</div>}
                  {state.weather.show && <div className="flex flex-col"><span className={`${weatherPanelSize.temp} font-black leading-none`}>{state.weather.temp}°C</span><span className={`${weatherPanelSize.city} uppercase font-black opacity-80 mt-1`}>{state.weather.city}</span></div>}
                </div>
              </div>

              {/* Conductores */}
              <div className="absolute bottom-[200px] w-full h-24 pointer-events-none z-40">
                {state.hosts.map((h) => {
                  if (!h.name) return null;
                  let pos = h.id === 'izquierda' ? 'left-24' : h.id === 'centro' ? 'left-1/2 -translate-x-1/2' : 'right-24';
                  return (
                    <div key={h.id} className={`absolute top-0 transition-all duration-700 ease-[cubic-bezier(0.34,1.56,0.64,1)] ${pos} ${getFX(h.show, 'host')}`} style={{ transform: `translateX(${h.xOffset}px) ${h.id === 'centro' ? 'translateX(-50%)' : ''}` }}>
                      <div className={`flex items-center px-10 py-5 rounded-3xl backdrop-blur-3xl border-2 ${activeTheme.panelBg} ${activeTheme.text} ${activeTheme.border} ${activeTheme.shadow}`}>
                        {h.image && <div className="mr-6 -ml-4 w-16 h-16 rounded-full border-4 border-current/20 overflow-hidden shadow-2xl shrink-0"><img src={h.image} className="w-full h-full object-cover" /></div>}
                        <h3 className={`text-3xl font-black tracking-tight ${activeTheme.titleFont}`}>{h.name}</h3>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Zócalo */}
              <div className={`absolute bottom-0 w-full transition-all duration-700 ease-out z-50 ${getFX(state.lowerThird.show, 'zocalo')}`}>
                <div className="w-full max-w-[1700px] mx-auto mb-10 flex flex-col gap-0 drop-shadow-2xl px-12">
                  <div className={`px-10 py-3.5 backdrop-blur-3xl border-x-2 border-t-2 ${activeTheme.panelBg} ${activeTheme.text} ${activeTheme.border} rounded-t-3xl w-fit self-start ml-4 relative z-10 -mb-0.5 shadow-lg`}>
                    <p className={`text-2xl font-black tracking-tighter uppercase opacity-90 ${activeTheme.bodyFont || ''}`}>
                      {state.lowerThird.subtitle}
                    </p>
                  </div>
                  <div className={`p-10 w-full border-2 ${activeTheme.accent} ${activeTheme.shadow} rounded-2xl rounded-tl-none relative z-20`}>
                    <h2 className={`text-7xl text-white ${activeTheme.titleFont} font-black tracking-tighter uppercase leading-none`}>
                      {state.lowerThird.title}
                    </h2>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // --- DASHBOARD PRINCIPAL ---
        function DashboardView({ state, updateState, activeTab, setActiveTab }) {
          const [copied, setCopied] = useState(false);
          const handleCopyLink = async () => {
            const url = new URL(window.location.href);
            url.searchParams.set('mode', 'overlay');
            const textToCopy = url.toString();
            try {
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(textToCopy);
              } else {
                throw new Error('Clipboard API no disponible');
              }
            } catch (error) {
              const tempInput = document.createElement('textarea');
              tempInput.value = textToCopy;
              tempInput.style.position = 'fixed';
              tempInput.style.opacity = '0';
              document.body.appendChild(tempInput);
              tempInput.focus();
              tempInput.select();
              document.execCommand('copy');
              document.body.removeChild(tempInput);
            }
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          return (
            <div className="h-screen w-screen overflow-hidden bg-zinc-950 text-white flex flex-col md:flex-row font-sans">
              <aside className="w-full md:w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col z-10 shrink-0 shadow-2xl">
                <div className="p-4 flex items-center gap-3 border-b border-zinc-800 shrink-0">
                  <Radio className="text-red-600 animate-pulse" size={20} />
                  <h1 className="font-black text-sm tracking-tight uppercase italic">Broadcast Pro</h1>
                </div>
                <nav className="p-2 flex-1 space-y-1 overflow-y-auto">
                  <NavButton id="zocalos" icon={<LayoutTemplate size={16}/>} label="Zócalos" active={activeTab} onClick={setActiveTab} />
                  <NavButton id="conductores" icon={<User size={16}/>} label="Conductores" active={activeTab} onClick={setActiveTab} />
                  <NavButton id="clima" icon={<CloudSun size={16}/>} label="Clima / Hora" active={activeTab} onClick={setActiveTab} />
                  <NavButton id="tema" icon={<Settings size={16}/>} label="Temas / FX" active={activeTab} onClick={setActiveTab} />
                  <NavButton id="info" icon={<Info size={16}/>} label="Información" active={activeTab} onClick={setActiveTab} />
                </nav>
                <div className="px-3 py-2 shrink-0 border-t border-zinc-800 bg-zinc-900/50">
                  <PreviewScreen state={state} />
                </div>
                <div className="p-3 border-t border-zinc-800 bg-zinc-900">
                  <button onClick={handleCopyLink} className="w-full mb-2 bg-zinc-800 hover:bg-zinc-700 text-white p-2 rounded-lg text-[10px] font-black tracking-widest transition-all uppercase">
                    {copied ? 'COPIADO' : 'COPIAR URL OBS'}
                  </button>
                </div>
              </aside>
              <main className="flex-1 bg-zinc-950 overflow-y-auto p-4 md:p-6">
                {activeTab === 'zocalos' && <PanelZocalos state={state} updateState={updateState} />}
                {activeTab === 'conductores' && <PanelConductores state={state} updateState={updateState} />}
                {activeTab === 'clima' && <PanelClima state={state} updateState={updateState} />}
                {activeTab === 'tema' && <PanelTema state={state} updateState={updateState} />}
                {activeTab === 'info' && <PanelInfo />}
              </main>
            </div>
          );
        }

        // --- APP PRINCIPAL ---
        function App() {
          const STORAGE_KEY = 'obs_panel_state_final_v4';
          const CHANNEL_NAME = 'obs_studio_sync_final_v4';
          const isOverlay = window.location.search.includes('mode=overlay');
          const [state, setState] = useState(() => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              try {
                const parsed = JSON.parse(saved);
                return {
                  ...DEFAULT_STATE,
                  ...parsed,
                  lowerThird: { ...DEFAULT_STATE.lowerThird, ...(parsed.lowerThird || {}), show: false },
                  hosts: Array.isArray(parsed.hosts) ? parsed.hosts : DEFAULT_STATE.hosts,
                  weather: { ...DEFAULT_STATE.weather, ...(parsed.weather || {}) },
                  time: { ...DEFAULT_STATE.time, ...(parsed.time || {}) }
                };
              } catch (e) {}
            }
            return DEFAULT_STATE;
          });
          const [activeTab, setActiveTab] = useState('zocalos');
          const bcRef = useRef(null);
          const stateRef = useRef(state);

          useEffect(() => {
            stateRef.current = state;
          }, [state]);

          useEffect(() => {
            if (typeof BroadcastChannel === 'undefined') {
              return undefined;
            }
            const bc = new BroadcastChannel(CHANNEL_NAME);
            bcRef.current = bc;
            bc.onmessage = (event) => {
              if (event.data?.type === 'STATE_UPDATE' && isOverlay) {
                const incoming = event.data?.payload || {};
                setState((prev) => ({
                  ...prev,
                  ...incoming,
                  lowerThird: { ...prev.lowerThird, ...(incoming.lowerThird || {}) },
                  hosts: Array.isArray(incoming.hosts) ? incoming.hosts : prev.hosts,
                  weather: { ...prev.weather, ...(incoming.weather || {}) },
                  time: { ...prev.time, ...(incoming.time || {}) }
                }));
              }
              if (event.data?.type === 'REQUEST_STATE' && !isOverlay) {
                bc.postMessage({ type: 'STATE_UPDATE', payload: stateRef.current });
              }
            };
            if (isOverlay) {
              bc.postMessage({ type: 'REQUEST_STATE' });
            }
            return () => {
              bc.close();
              if (bcRef.current === bc) bcRef.current = null;
            };
          }, [isOverlay, CHANNEL_NAME]);

          useEffect(() => {
            const onStorage = (event) => {
              if (event.key !== STORAGE_KEY || !event.newValue || !isOverlay) return;
              try {
                const parsed = JSON.parse(event.newValue);
                setState((prev) => ({
                  ...prev,
                  ...parsed,
                  lowerThird: { ...prev.lowerThird, ...(parsed.lowerThird || {}) },
                  hosts: Array.isArray(parsed.hosts) ? parsed.hosts : prev.hosts,
                  weather: { ...prev.weather, ...(parsed.weather || {}) },
                  time: { ...prev.time, ...(parsed.time || {}) }
                }));
              } catch (error) {}
            };
            window.addEventListener('storage', onStorage);
            return () => window.removeEventListener('storage', onStorage);
          }, [isOverlay, STORAGE_KEY]);

          const updateState = (updater) => {
            setState((prevState) => {
              const newState = typeof updater === 'function' ? updater(prevState) : { ...prevState, ...updater };
              if (!isOverlay) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(newState));
              }
              if (bcRef.current) {
                bcRef.current.postMessage({ type: 'STATE_UPDATE', payload: newState });
              }
              return newState;
            });
          };

          if (isOverlay) return <OverlayView state={state} />;
          return <DashboardView state={state} updateState={updateState} activeTab={activeTab} setActiveTab={setActiveTab} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js').catch(() => {});
        });
      }
    </script>
</body>
</html>
