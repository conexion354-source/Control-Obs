<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broadcast Pro - Mauro Polini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&family=Roboto:wght@900&display=swap">
</head>
<body class="bg-zinc-950 text-white m-0 p-0 overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- TEMAS VISUALES ---
        const THEMES = {
            modernBlue: { name: 'Azul Moderno', panelBg: 'bg-blue-900/95', text: 'text-white', border: 'border-blue-400/50', accent: 'bg-blue-600', shadow: 'shadow-xl', font: 'font-["Montserrat"]' },
            breakingRed: { name: 'Último Momento', panelBg: 'bg-red-950/95', text: 'text-white', border: 'border-red-500', accent: 'bg-red-600', shadow: 'shadow-2xl', font: 'font-["Montserrat"]' },
            elegantGold: { name: 'Elegante Pro', panelBg: 'bg-zinc-950/95', text: 'text-amber-50', border: 'border-amber-500/60', accent: 'bg-amber-600 text-black', shadow: 'shadow-2xl', font: 'font-["Montserrat"]' },
            minimalDark: { name: 'Mínimal Oscuro', panelBg: 'bg-zinc-900/95', text: 'text-zinc-100', border: 'border-zinc-700', accent: 'bg-blue-500', shadow: 'shadow-md', font: 'font-["Roboto"]' }
        };

        function App() {
            const isOverlay = window.location.search.includes('mode=overlay');
            const [activeTab, setActiveTab] = useState('zocalos');
            const [state, setState] = useState({
                theme: 'modernBlue',
                liveBadge: { show: true },
                lowerThird: { title: 'TÍTULO DE LA NOTICIA', subtitle: 'ESTO ES UN SUBTÍTULO ARRIBA', show: false },
                hosts: [
                    { id: 'izquierda', name: 'Conductor 1', show: false, image: null },
                    { id: 'centro', name: 'Conductor 2', show: false, image: null },
                    { id: 'derecha', name: 'Conductor 3', show: false, image: null }
                ],
                weather: { city: 'Buenos Aires', temp: 22, show: true },
                time: { show: true }
            });

            const bc = useRef(new BroadcastChannel('obs_broadcast_vfinal'));

            useEffect(() => {
                bc.current.onmessage = (e) => { if (isOverlay) setState(e.data); };
            }, [isOverlay]);

            const update = (newState) => {
                setState(newState);
                bc.current.postMessage(newState);
            };

            if (isOverlay) return <OverlayView state={state} />;

            return (
                <div className="h-screen w-screen flex bg-zinc-950 text-white">
                    {/* BARRA LATERAL */}
                    <aside className="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col shrink-0">
                        <div className="p-4 border-b border-zinc-800 font-black text-xs uppercase tracking-widest italic text-blue-500">
                            Broadcast Control Pro
                        </div>
                        <nav className="p-2 flex-1 space-y-1">
                            {['zocalos', 'conductores', 'clima', 'tema', 'info'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`w-full text-left px-3 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'bg-blue-600 text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>
                                    {tab}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-zinc-800 text-center">
                            <button onClick={() => {
                                const url = new URL(window.location.href);
                                url.searchParams.set('mode', 'overlay');
                                navigator.clipboard.writeText(url.toString());
                                alert("Link copiado para fuente de navegador en OBS");
                            }} className="w-full bg-zinc-800 p-2 rounded text-[9px] font-black uppercase border border-zinc-700 hover:bg-zinc-700">Copiar Link OBS</button>
                        </div>
                    </aside>

                    {/* CONTENIDO PRINCIPAL */}
                    <main className="flex-1 p-10 overflow-y-auto">
                        {activeTab === 'zocalos' && (
                            <div className="max-w-2xl space-y-6">
                                <div className="flex justify-between items-center bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                                    <h2 className="font-black uppercase italic text-xl">Zócalos</h2>
                                    <button onClick={() => update({...state, lowerThird: {...state.lowerThird, show: !state.lowerThird.show}})} className={`px-6 py-2 rounded-lg font-black text-xs ${state.lowerThird.show ? 'bg-red-600 animate-pulse' : 'bg-zinc-800'}`}>
                                        {state.lowerThird.show ? 'AL AIRE' : 'MOSTRAR'}
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    <input type="text" value={state.lowerThird.title} onChange={e => update({...state, lowerThird: {...state.lowerThird, title: e.target.value.toUpperCase()}})} className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl font-black text-xl" placeholder="TÍTULO GRANDE" />
                                    <textarea value={state.lowerThird.subtitle} onChange={e => update({...state, lowerThird: {...state.lowerThird, subtitle: e.target.value}})} className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl font-bold h-24" placeholder="SUBTÍTULO ARRIBA" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'conductores' && (
                            <div className="grid grid-cols-3 gap-4">
                                {state.hosts.map((h, i) => (
                                    <div key={h.id} className="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 space-y-4">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-black text-zinc-500 uppercase">{h.id}</span>
                                            <input type="checkbox" checked={h.show} onChange={() => {
                                                const nh = [...state.hosts]; nh[i].show = !nh[i].show;
                                                update({...state, hosts: nh});
                                            }} />
                                        </div>
                                        <input type="text" value={h.name} onChange={e => {
                                            const nh = [...state.hosts]; nh[i].name = e.target.value;
                                            update({...state, hosts: nh});
                                        }} className="w-full bg-zinc-950 p-2 rounded text-xs" />
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'clima' && (
                            <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 max-w-sm space-y-4">
                                <h3 className="font-black text-xs uppercase text-zinc-500">Clima / Hora</h3>
                                <div className="flex gap-4">
                                    <button onClick={() => update({...state, weather: {...state.weather, show: !state.weather.show}})} className={`p-2 rounded text-[10px] font-black ${state.weather.show ? 'bg-blue-600' : 'bg-zinc-800'}`}>CLIMA</button>
                                    <button onClick={() => update({...state, time: {...state.time, show: !state.time.show}})} className={`p-2 rounded text-[10px] font-black ${state.time.show ? 'bg-blue-600' : 'bg-zinc-800'}`}>HORA</button>
                                </div>
                                <input type="text" value={state.weather.city} onChange={e => update({...state, weather: {...state.weather, city: e.target.value}})} className="w-full bg-zinc-950 p-3 rounded-xl text-xs" />
                            </div>
                        )}

                        {activeTab === 'tema' && (
                            <div className="grid grid-cols-2 gap-4">
                                {Object.keys(THEMES).map(k => (
                                    <button key={k} onClick={() => update({...state, theme: k})} className={`p-4 rounded-2xl border-2 transition-all ${state.theme === k ? 'border-blue-500 bg-blue-500/10' : 'border-zinc-800 bg-zinc-900'}`}>
                                        <div className={`w-full h-2 rounded mb-2 ${THEMES[k].panelBg}`}></div>
                                        <span className="text-[10px] font-black uppercase">{THEMES[k].name}</span>
                                    </button>
                                ))}
                                <div className="col-span-2 pt-4 border-t border-zinc-800">
                                    <button onClick={() => update({...state, liveBadge: {...state.liveBadge, show: !state.liveBadge.show}})} className={`p-4 rounded-2xl font-black text-xs w-full ${state.liveBadge.show ? 'bg-red-600' : 'bg-zinc-800'}`}>MOSTRAR CARTEL "VIVO"</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="max-w-md mx-auto bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center shadow-2xl">
                                <h2 className="text-xl font-black uppercase italic mb-4">Información</h2>
                                <div className="h-px bg-zinc-800 w-full mb-6"></div>
                                <p className="text-[10px] font-black text-zinc-500 uppercase mb-1">Desarrollador</p>
                                <p className="text-lg font-bold mb-6">MAURO MAXIMILIANO POLINI</p>
                                <p className="text-blue-400 font-black">+54 3735 500082</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function OverlayView({ state }) {
            const [t, setT] = useState('');
            const theme = THEMES[state.theme] || THEMES.modernBlue;

            useEffect(() => {
                const iv = setInterval(() => setT(new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })), 1000);
                return () => clearInterval(iv);
            }, []);

            return (
                <div className="absolute inset-0 w-[1920px] h-[1080px] pointer-events-none select-none bg-transparent">
                    {/* CARTEL VIVO (IZQUIERDA) */}
                    <div className={`absolute top-10 left-10 transition-all duration-700 ${state.liveBadge.show ? 'opacity-100 scale-100' : 'opacity-0 scale-90'}`}>
                        <div className="bg-red-600 px-8 py-3 rounded-2xl flex items-center gap-4 border border-white/20 shadow-2xl">
                            <div className="w-4 h-4 bg-white rounded-full animate-pulse shadow-[0_0_10px_#fff]"></div>
                            <span className="text-xl font-black text-white uppercase tracking-[0.4em] font-['Montserrat']">VIVO</span>
                        </div>
                    </div>

                    {/* HORA Y CLIMA (DERECHA) */}
                    <div className={`absolute top-10 right-10 flex items-center gap-10 px-10 py-5 rounded-2xl border transition-all duration-700 ${state.time.show || state.weather.show ? 'opacity-100' : 'opacity-0'} ${theme.panelBg} ${theme.text} ${theme.border} ${theme.shadow}`}>
                        {state.time.show && <div className="text-5xl font-black tracking-tighter border-r border-current/20 pr-10 font-['Montserrat']">{t || '00:00'}</div>}
                        {state.weather.show && <div className="flex flex-col"><span className="text-4xl font-black leading-none font-['Montserrat']">{state.weather.temp}°C</span><span className="text-xs uppercase font-black opacity-70 font-['Montserrat']">{state.weather.city}</span></div>}
                    </div>

                    {/* CONDUCTORES */}
                    <div className="absolute bottom-[280px] w-full flex justify-around px-24">
                        {state.hosts.map(h => h.show && (
                            <div key={h.id} className={`flex items-center px-10 py-5 rounded-[30px] border-2 transition-all duration-700 ${theme.panelBg} ${theme.text} ${theme.border} ${theme.shadow}`}>
                                <h3 className={`text-4xl font-black uppercase ${theme.font}`}>{h.name}</h3>
                            </div>
                        ))}
                    </div>

                    {/* ZÓCALO REESTRUCTURADO */}
                    <div className={`absolute bottom-0 w-full transition-all duration-700 ${state.lowerThird.show ? 'translate-y-0 opacity-100' : 'translate-y-40 opacity-0'}`}>
                        <div className="w-full max-w-[1750px] mx-auto mb-12 flex flex-col px-12">
                            {/* Subtítulo (ARRIBA) */}
                            <div className={`px-12 py-4 rounded-t-[40px] w-fit ml-8 border-2 border-b-0 ${theme.panelBg} ${theme.text} ${theme.border} shadow-lg relative z-10 -mb-0.5`}>
                                <p className={`text-3xl font-black uppercase italic tracking-tighter ${theme.font}`}>{state.lowerThird.subtitle}</p>
                            </div>
                            {/* Título Principal (ABAJO) */}
                            <div className={`p-12 w-full border-2 rounded-[40px] rounded-tl-none shadow-2xl ${theme.accent} ${theme.shadow} border-white/10 relative z-20`}>
                                <h2 className={`text-8xl text-white font-black uppercase leading-none tracking-tighter ${theme.font}`}>{state.lowerThird.title}</h2>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
