<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broadcast Control PO</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@900&family=Orbitron:wght@700&family=Roboto:wght@900&display=swap">
</head>
<body class="bg-zinc-950 text-white m-0 p-0 overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYNC_CHANNEL = "broadcast_pro_mauro_polini_vfinal";

        // --- TEMAS ---
        const THEMES = {
            modernBlue: { panelBg: 'bg-blue-900/95', accent: 'bg-blue-600', border: 'border-blue-400/50' },
            breakingRed: { panelBg: 'bg-red-950/95', accent: 'bg-red-600', border: 'border-red-500' },
            elegantGold: { panelBg: 'bg-zinc-950/95', accent: 'bg-amber-600', border: 'border-amber-500/60' }
        };

        const resizeImage = (file) => new Promise(res => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0, 0, 200, 200);
                    res(canvas.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        function App() {
            const isOverlay = window.location.search.includes('mode=overlay');
            const [activeTab, setActiveTab] = useState('zocalos');
            const [localTitles, setLocalTitles] = useState({ title: '', subtitle: '' });
            
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('po_broadcast_state');
                return saved ? JSON.parse(saved) : {
                    theme: 'modernBlue',
                    liveBadge: { show: true },
                    lowerThird: { title: 'TÍTULO PRINCIPAL', subtitle: 'SUBTÍTULO', show: false },
                    hosts: [
                        { id: 'izquierda', name: 'Conductor 1', xOffset: 0, show: false, image: null },
                        { id: 'centro', name: 'Conductor 2', xOffset: 0, show: false, image: null },
                        { id: 'derecha', name: 'Conductor 3', xOffset: 0, show: false, image: null }
                    ],
                    weather: { city: 'Buenos Aires', temp: 22, show: true },
                    time: { show: true }
                };
            });

            const bc = useRef(new BroadcastChannel(SYNC_CHANNEL));

            useEffect(() => {
                if (!isOverlay) {
                    localStorage.setItem('po_broadcast_state', JSON.stringify(state));
                    bc.current.postMessage(state);
                }
                setLocalTitles({ title: state.lowerThird.title, subtitle: state.lowerThird.subtitle });
            }, [state.theme, state.liveBadge, state.hosts, state.weather, state.time, state.lowerThird.show]);

            useEffect(() => {
                bc.current.onmessage = (e) => { if (isOverlay) setState(e.data); };
            }, [isOverlay]);

            const updateField = (category, field, value) => {
                setState(prev => ({ ...prev, [category]: { ...prev[category], [field]: value } }));
            };

            if (isOverlay) return <OverlayView state={state} />;

            return (
                <div className="h-screen w-screen flex bg-zinc-950 text-white overflow-hidden">
                    <aside className="w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-zinc-800">
                            <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white text-xl shadow-lg shadow-blue-900/40">PO</div>
                            <span className="font-black text-xs uppercase tracking-widest">Broadcast</span>
                        </div>
                        <nav className="p-2 flex-1 space-y-1">
                            {['zocalos', 'conductores', 'clima', 'tema', 'info'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`w-full text-left px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === t ? 'bg-blue-600 text-white shadow-lg' : 'text-zinc-500 hover:text-zinc-300'}`}>{t}</button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-zinc-800 bg-zinc-900/50">
                             <button onClick={() => {
                                const url = new URL(window.location.href);
                                url.searchParams.set('mode', 'overlay');
                                navigator.clipboard.writeText(url.toString());
                                alert("Link de OBS Copiado!");
                             }} className="w-full bg-zinc-800 p-3 rounded-xl text-[9px] font-black uppercase border border-zinc-700 hover:bg-zinc-700 transition-all">Copiar Link OBS</button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-10">
                        {activeTab === 'zocalos' && (
                            <div className="max-w-3xl space-y-8">
                                <div className="flex justify-between items-center bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-xl">
                                    <h2 className="font-black uppercase italic text-2xl tracking-tighter">Control de Títulos</h2>
                                    <button onClick={() => updateField('lowerThird', 'show', !state.lowerThird.show)} className={`px-10 py-3 rounded-2xl font-black text-xs transition-all ${state.lowerThird.show ? 'bg-red-600 animate-pulse' : 'bg-zinc-800'}`}>
                                        {state.lowerThird.show ? 'SALIR DEL AIRE' : 'PONER AL AIRE'}
                                    </button>
                                </div>
                                <div className="bg-zinc-900 p-8 rounded-[40px] border border-zinc-800 space-y-6 shadow-2xl">
                                    <input type="text" value={localTitles.title} onChange={e => setLocalTitles({...localTitles, title: e.target.value.toUpperCase()})} className="w-full bg-zinc-950 border border-zinc-800 p-5 rounded-2xl text-white font-black text-2xl outline-none focus:border-blue-500" placeholder="ESCRIBIR TÍTULO..." />
                                    <textarea value={localTitles.subtitle} onChange={e => setLocalTitles({...localTitles, subtitle: e.target.value})} className="w-full bg-zinc-950 border border-zinc-800 p-5 rounded-2xl text-white font-bold h-24 resize-none outline-none focus:border-blue-500" placeholder="ESCRIBIR SUBTÍTULO..."></textarea>
                                    <button onClick={() => setState({...state, lowerThird: {...state.lowerThird, title: localTitles.title, subtitle: localTitles.subtitle}})} className="w-full bg-blue-600 p-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 transition-all">Sincronizar con el Aire</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'conductores' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {state.hosts.map((h, i) => (
                                    <div key={h.id} className={`p-6 rounded-[35px] border transition-all ${h.show ? 'bg-blue-600/5 border-blue-500/40 shadow-2xl' : 'bg-zinc-900 border-zinc-800 opacity-60'}`}>
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="text-[10px] font-black uppercase text-zinc-500 tracking-widest">{h.id}</span>
                                            <button onClick={() => {
                                                const nh = [...state.hosts]; nh[i].show = !nh[i].show;
                                                setState({...state, hosts: nh});
                                            }} className={`w-8 h-8 rounded-full border-2 ${h.show ? 'bg-blue-600 border-blue-400' : 'bg-zinc-800 border-zinc-700'}`}></button>
                                        </div>
                                        <input type="text" value={h.name} onChange={e => {
                                            const nh = [...state.hosts]; nh[i].name = e.target.value;
                                            setState({...state, hosts: nh});
                                        }} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs font-bold mb-2 outline-none" />
                                        
                                        <div className="flex justify-between items-center mb-4 px-1">
                                            <span className="text-[9px] font-black text-zinc-500 uppercase">Posición</span>
                                            <span className="text-[10px] font-black text-blue-500">{h.xOffset}px</span>
                                        </div>
                                        <input type="range" min="-600" max="600" value={h.xOffset} onChange={e => {
                                            const nh = [...state.hosts]; nh[i].xOffset = parseInt(e.target.value);
                                            setState({...state, hosts: nh});
                                        }} className="w-full mb-6 accent-blue-500" />
                                        
                                        <label className="block bg-zinc-950 border border-zinc-800 p-4 rounded-2xl text-center cursor-pointer hover:bg-zinc-800 transition-all">
                                            {h.image && <img src={h.image} className="w-12 h-12 rounded-full mx-auto mb-2 object-cover border-2 border-blue-500" />}
                                            <span className="text-[10px] font-black uppercase text-zinc-500">Subir Foto</span>
                                            <input type="file" className="hidden" accept="image/*" onChange={async e => {
                                                const nh = [...state.hosts]; nh[i].image = await resizeImage(e.target.files[0]);
                                                setState({...state, hosts: nh});
                                            }} />
                                        </label>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'clima' && (
                            <div className="max-w-md bg-zinc-900 p-8 rounded-[40px] border border-zinc-800 space-y-6 shadow-2xl">
                                <h3 className="font-black text-xs uppercase text-zinc-500 tracking-widest">Memoria de Clima</h3>
                                <input type="text" value={state.weather.city} onChange={e => updateField('weather', 'city', e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-2xl text-sm font-bold text-white outline-none" placeholder="CIUDAD..." />
                                <div className="flex justify-between items-center bg-zinc-950 p-6 rounded-3xl border border-zinc-800">
                                    <span className="font-black text-2xl uppercase italic tracking-tighter">{state.weather.city}</span>
                                    <input type="number" value={state.weather.temp} onChange={e => updateField('weather', 'temp', e.target.value)} className="w-20 bg-transparent text-right font-black text-4xl text-blue-500 outline-none" />
                                </div>
                                <p className="text-[9px] text-zinc-500 text-center font-bold uppercase italic">La ciudad se guarda automáticamente al escribir</p>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="max-w-xl mx-auto bg-zinc-900 p-12 rounded-[50px] border border-zinc-800 text-center shadow-2xl">
                                <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-white text-3xl mx-auto mb-8">PO</div>
                                <h2 className="text-3xl font-black uppercase italic mb-4">Mauro Maximiliano Polini</h2>
                                <div className="h-px bg-zinc-800 w-full mb-8"></div>
                                <p className="text-blue-400 font-black text-xl">+54 3735 500082</p>
                                <p className="mt-10 text-[9px] text-zinc-600 font-mono tracking-widest uppercase">Broadcast PO Engine v5.0 • 2026</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function OverlayView({ state }) {
            const [t, setT] = useState('');
            const theme = THEMES[state.theme] || THEMES.modernBlue;

            useEffect(() => {
                const iv = setInterval(() => setT(new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })), 1000);
                return () => clearInterval(iv);
            }, []);

            return (
                <div className="absolute inset-0 w-[1920px] h-[1080px] pointer-events-none select-none bg-transparent overflow-hidden">
                    {/* Badge VIVO */}
                    <div className={`absolute top-10 left-10 transition-all duration-1000 ${state.liveBadge.show ? 'opacity-100 scale-100' : 'opacity-0 scale-90 translate-y-[-20px]'}`}>
                        <div className="bg-red-600 px-10 py-4 flex items-center justify-center gap-5 rounded-3xl border border-white/20 shadow-2xl">
                            <div className="w-5 h-5 rounded-full bg-white animate-pulse shadow-[0_0_15px_#fff]"></div>
                            <span className="text-2xl font-black tracking-[0.5em] text-white uppercase font-['Montserrat']">Vivo</span>
                        </div>
                    </div>

                    {/* Clima y Hora */}
                    <div className={`absolute top-10 right-10 flex items-center gap-12 px-12 py-6 rounded-[40px] backdrop-blur-3xl border transition-all duration-1000 ${state.time.show || state.weather.show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-[-50px]'} ${theme.panelBg} ${theme.border}`}>
                        {state.time.show && <div className="text-6xl font-black tracking-tighter border-r border-white/20 pr-10 font-['Montserrat']">{t || '00:00'}</div>}
                        {state.weather.show && <div className="flex flex-col"><span className="text-5xl font-black leading-none font-['Montserrat']">{state.weather.temp}°C</span><span className="text-xs uppercase font-black opacity-70 mt-2 font-['Montserrat']">{state.weather.city}</span></div>}
                    </div>

                    {/* Conductores Animados */}
                    <div className="absolute bottom-[300px] w-full flex justify-around px-24">
                        {state.hosts.map(h => (
                            <div key={h.id} style={{ transform: `translateX(${h.xOffset}px)` }} className={`flex items-center px-12 py-6 rounded-[50px] backdrop-blur-3xl border-2 transition-all duration-1000 ${h.show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-[100px]'} ${theme.panelBg} ${theme.border}`}>
                                {h.image && <img src={h.image} className="w-20 h-20 rounded-full border-4 border-white/20 mr-6 object-cover shadow-xl" />}
                                <h3 className="text-4xl font-black uppercase tracking-tight font-['Montserrat']">{h.name}</h3>
                            </div>
                        ))}
                    </div>

                    {/* Zócalo Stack Animado */}
                    <div className={`absolute bottom-0 w-full transition-all duration-1000 ${state.lowerThird.show ? 'translate-y-0 opacity-100' : 'translate-y-[200px] opacity-0'}`}>
                        <div className="w-full max-w-[1850px] mx-auto mb-16 flex flex-col px-20">
                            <div className={`px-14 py-5 backdrop-blur-3xl border-x-2 border-t-2 rounded-t-[50px] w-fit ml-10 relative z-10 -mb-0.5 shadow-2xl ${theme.panelBg} ${theme.border}`}>
                                <p className="text-4xl font-black uppercase tracking-tighter italic font-['Montserrat']">{state.lowerThird.subtitle}</p>
                            </div>
                            <div className={`p-14 w-full border-2 rounded-[50px] rounded-tl-none relative z-20 shadow-[0_30px_60px_rgba(0,0,0,0.6)] ${theme.accent} border-white/10`}>
                                <h2 className="text-[110px] text-white font-black uppercase leading-none tracking-tighter font-['Montserrat']">{state.lowerThird.title}</h2>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
